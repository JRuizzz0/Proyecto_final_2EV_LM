<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/script.js" defer></script>
    <title>Main</title>

    
</head>
<body>
    <div class="directorio-container">
       
        <header class="header">
            <h1>Directorio de animes</h1>
            <nav class="nav">
               <input id="CampoBusqueda" type="text" placeholder="Campo de busqueda">
               <button id="btnBusqueda">Buscar</button>
              <select id="selectorTema" class="tema">
                    <option value="claro">Claro</option>
                    <option value="oscuro">Oscuro</option>
                    <option value="custom">Personalizado</option>
              </select>
               <button id="addTarjeta">Añadir tarjeta</button>
            </nav>
        </header>

        <main>

             <div id="tarjetas"></div>
            

        </main>
    
        
        <footer class="footer">
            <p>&copy; 2026 AnimeDirect-Jaime Ruiz. Todos los derechos reservados.</p>
            <div class="social">
               <p>Pagina desarrollada por: Jaime Ruiz</p>
                <a href="#">Crunchyroll</a>
                <a href="#">Twitter</a>
            </div>
        </footer>
    </div>
    <div id="modalTema" class="modal">
    <div class="modal-content">
        <h2>Tema Personalizado</h2>
        
        <label>Color del Header:</label>
        <input type="color" id="colorHeader">
        
        <label>Color del Main:</label>
        <input type="color" id="colorMain">
        
        <label>Color del Footer:</label>
        <input type="color" id="colorFooter">
        
        <button id="btnGuardarTema">Aplicar colores</button>
        <button id="btnCerrarTema">Cancelar</button>
    </div>
</div>
</body>
</html>
